<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Conversor de Moedas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffe0dc; /* tom salmão suave */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #fff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }
    h2 {
      color: #d65a5a;
    }
    button {
      display: block;
      width: 100%;
      background: #d65a5a;
      color: #fff;
      border: none;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
    button:hover {
      background: #a94444;
    }
    input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .resultado {
      margin-top: 12px;
      font-size: 20px;       /* maior para destaque */
      font-weight: bold;
      color: #1b5e20;        /* verde escuro */
    }
    .calculadora {
      display: none;
    }
    .voltar {
      width: 40%;            /* menor que os outros */
      background: #999;      /* cinza discreto */
      font-size: 13px;
      margin-top: 15px;
    }
    .voltar:hover {
      background: #666;
    }
  </style>
</head>
<body>
  <div class="box" id="menu">
    <h2>Conversor de Moedas</h2>
    <button onclick="abrirCalc('usd')">CLP ↔ USD</button>
    <button onclick="abrirCalc('eur')">CLP ↔ EUR</button>
  </div>

  <!-- Calculadora USD -->
  <div class="box calculadora" id="calc_usd">
    <h2>CLP ↔ USD</h2>
    <p>Cotação fixa: 1 USD = 797 CLP</p>
    <input type="number" id="clp_usd" placeholder="Valor em CLP">
    <button onclick="converterParaUSD()">CLP → USD</button>
    <input type="number" id="usd" placeholder="Valor em USD">
    <button onclick="converterParaCLP()">USD → CLP</button>
    <div class="resultado" id="resultado_usd"></div>
    <button class="voltar" onclick="voltarMenu()">Voltar</button>
  </div>

  <!-- Calculadora EUR -->
  <div class="box calculadora" id="calc_eur">
    <h2>CLP ↔ EUR</h2>
    <p>Cotação fixa: 1 EUR = 854 CLP</p>
    <input type="number" id="clp_eur" placeholder="Valor em CLP">
    <button onclick="converterParaEUR()">CLP → EUR</button>
    <input type="number" id="eur" placeholder="Valor em EUR">
    <button onclick="converterParaCLP_EUR()">EUR → CLP</button>
    <div class="resultado" id="resultado_eur"></div>
    <button class="voltar" onclick="voltarMenu()">Voltar</button>
  </div>

  <script>
    const taxaUSD = 797;
    const taxaEUR = 854;

    function abrirCalc(tipo) {
      document.getElementById("menu").style.display = "none";
      document.getElementById("calc_usd").style.display = "none";
      document.getElementById("calc_eur").style.display = "none";
      if(tipo === "usd") document.getElementById("calc_usd").style.display = "block";
      if(tipo === "eur") document.getElementById("calc_eur").style.display = "block";
    }

    function voltarMenu() {
      document.getElementById("menu").style.display = "block";
      document.getElementById("calc_usd").style.display = "none";
      document.getElementById("calc_eur").style.display = "none";
    }

    function converterParaUSD() {
      let clp = document.getElementById("clp_usd").value;
      if(clp){
        let usd = clp / taxaUSD;
        document.getElementById("resultado_usd").innerText = 
          Number(clp).toLocaleString("pt-BR") + " CLP = " + usd.toFixed(2) + " USD";
      }
    }

    function converterParaCLP() {
      let usd = document.getElementById("usd").value;
      if(usd){
        let clp = usd * taxaUSD;
        document.getElementById("resultado_usd").innerText = 
          usd + " USD = " + clp.toLocaleString("pt-BR") + " CLP";
      }
    }

    function converterParaEUR() {
      let clp = document.getElementById("clp_eur").value;
      if(clp){
        let eur = clp / taxaEUR;
        document.getElementById("resultado_eur").innerText = 
          Number(clp).toLocaleString("pt-BR") + " CLP = " + eur.toFixed(2) + " EUR";
      }
    }

    function converterParaCLP_EUR() {
      let eur = document.getElementById("eur").value;
      if(eur){
        let clp = eur * taxaEUR;
        document.getElementById("resultado_eur").innerText = 
          eur + " EUR = " + clp.toLocaleString("pt-BR") + " CLP";
      }
    }
  </script>
</body>
</html>
