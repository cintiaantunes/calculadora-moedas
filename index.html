<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadoras CLP ↔ USD e CLP ↔ EUR</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a8b, #ff6a88, #ff99ac); /* tons salmão */
      color: #333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      padding: 40px;
      margin: 0;
    }
    .container {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 320px;
    }
    h2 {
      margin-bottom: 10px;
      color: #d65a5a;
    }
    p {
      font-size: 14px;
      color: #555;
    }
    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border: 2px solid #d65a5a;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #d65a5a;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin: 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.3s;
    }
    button:hover {
      background: #a94444;
    }
    .resultado {
      margin-top: 15px;
      font-size: 17px;
      font-weight: bold;
      color: #a94444;
      background: #ffe0dc;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <!-- Calculadora USD -->
  <div class="container">
    <h2>Conversor CLP ↔ USD</h2>
    <p>Cotação fixa: 1 USD = 797 CLP</p>

    <input type="number" id="clp_usd" placeholder="Digite valor em CLP">
    <br>
    <button onclick="converterParaUSD()">CLP → USD</button>
    <br>

    <input type="number" id="usd" placeholder="Digite valor em USD">
    <br>
    <button onclick="converterParaCLP()">USD → CLP</button>

    <div class="resultado" id="resultado_usd"></div>
  </div>

  <!-- Calculadora EUR -->
  <div class="container">
    <h2>Conversor CLP ↔ EUR</h2>
    <p>Cotação fixa: 1 EUR = 854 CLP</p>

    <input type="number" id="clp_eur" placeholder="Digite valor em CLP">
    <br>
    <button onclick="converterParaEUR()">CLP → EUR</button>
    <br>

    <input type="number" id="eur" placeholder="Digite valor em EUR">
    <br>
    <button onclick="converterParaCLP_EUR()">EUR → CLP</button>

    <div class="resultado" id="resultado_eur"></div>
  </div>

  <script>
    const taxaUSD = 797; // 1 USD = 797 CLP
    const taxaEUR = 854; // 1 EUR = 854 CLP

    // USD
    function converterParaUSD() {
      let clp = document.getElementById("clp_usd").value;
      if(clp){
        let usd = clp / taxaUSD;
        document.getElementById("resultado_usd").innerText = 
          Number(clp).toLocaleString("pt-BR") + " CLP = " + usd.toFixed(2) + " USD";
      }
    }

    function converterParaCLP() {
      let usd = document.getElementById("usd").value;
      if(usd){
        let clp = usd * taxaUSD;
        document.getElementById("resultado_usd").innerText = 
          usd + " USD = " + clp.toLocaleString("pt-BR") + " CLP";
      }
    }

    // EUR
    function converterParaEUR() {
      let clp = document.getElementById("clp_eur").value;
      if(clp){
        let eur = clp / taxaEUR;
        document.getElementById("resultado_eur").innerText = 
          Number(clp).toLocaleString("pt-BR") + " CLP = " + eur.toFixed(2) + " EUR";
      }
    }

    function converterParaCLP_EUR() {
      let eur = document.getElementById("eur").value;
      if(eur){
        let clp = eur * taxaEUR;
        document.getElementById("resultado_eur").innerText = 
          eur + " EUR = " + clp.toLocaleString("pt-BR") + " CLP";
      }
    }
  </script>
</body>
</html>
